name: traefik


services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command: 
      - --api=true
      - --api.dashboard=true
      - --log.level=DEBUG
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.cert-resolver.acme.httpchallenge=true
      - --certificatesresolvers.cert-resolver.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.cert-resolver.acme.email=shivangtripathi101@gmail.com
      - --certificatesresolvers.cert-resolver.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro    
      - ./certificates/letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.tls.certresolver=cert-resolver"

      
    ports:
      - "80:80"
      - "443:443"
    networks:
      - traefik
      - cas-network

networks:
  traefik:
    name: traefik
  cas-network:
    name: cas-network

  