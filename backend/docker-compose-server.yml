version: "3.9"

services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./var/www/rediocast/downloads:/app/downloads
      - ./logs:/app/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cas-router.rule=Host(`api.redio.radhakrishnajewellery.in`)"
      - "traefik.http.routers.cas-router.entrypoints=web,websecure"
      - "traefik.http.routers.cas-router.tls=true"
      - "traefik.http.routers.cas-router.tls.certresolver=cert-resolver"
      - "traefik.http.services.cas-service.loadbalancer.server.port=3000"
      - "traefik.docker.network=cas-network"
    networks:
      - internal
      - cas-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - internal
    


  downloads:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./var/www/rediocast/downloads:/usr/share/nginx/html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.downloads-router.rule=Host(`api.redio.radhakrishnajewellery.in`) && PathPrefix(`/downloads`)"
      - "traefik.http.routers.downloads-router.priority=100"
      - "traefik.http.routers.downloads-router.entrypoints=web,websecure"
      - "traefik.http.routers.downloads-router.tls=true"
      - "traefik.http.routers.downloads-router.tls.certresolver=cert-resolver"
      - "traefik.http.routers.downloads-router.middlewares=downloads-strip"
      - "traefik.http.middlewares.downloads-strip.stripprefix.prefixes=/downloads"
      - "traefik.http.services.downloads-service.loadbalancer.server.port=80"
      - "traefik.docker.network=cas-network"

volumes:
  db_data:

networks:
  internal:
    driver: bridge
  cas-network:
    external: true